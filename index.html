<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ALP TECH - JJK Cursed Clash</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a0a; color: white; text-align: center; margin: 0; overflow: hidden; }
        .screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .hidden { display: none; }
        
        /* Butonlar */
        button { background: #5d00ff; border: none; color: white; padding: 15px 40px; font-size: 18px; cursor: pointer; border-radius: 50px; transition: 0.3s; margin: 10px; box-shadow: 0 4px 15px rgba(93, 0, 255, 0.4); }
        button:hover { background: #7b2cff; transform: scale(1.1); }

        /* Karakter Kartları */
        .char-container { display: flex; gap: 20px; margin-bottom: 20px; }
        .card { width: 120px; height: 180px; border: 2px solid #333; border-radius: 15px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a1a; transition: 0.3s; }
        .card:hover { border-color: #5d00ff; }
        .card.selected { border-color: #00ffcc; box-shadow: 0 0 20px #00ffcc; transform: translateY(-10px); }
        .card img { width: 80px; height: 80px; border-radius: 50%; background: #333; margin-bottom: 10px; }

        /* Oyun Alanı */
        #game-canvas { background: url('https://i.imgur.com/3Z6K6yB.png') center/cover; border: 4px solid #333; display: none; margin: 20px auto; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="menu-screen" class="screen">
        <h1>JUJUTSU KAISEN</h1>
        <h2>ONLINE COMBAT <small>by ALP TECH</small></h2>
        <button onclick="showScreen('char-screen')">OYUNA BAŞLA</button>
    </div>

    <div id="char-screen" class="screen hidden">
        <h2>KARAKTERİNİ SEÇ</h2>
        <div class="char-container">
            <div class="card" onclick="selectChar('Yuji', this)">
                <div style="font-size: 40px;">👊</div>
                <span>Yuji</span>
            </div>
            <div class="card" onclick="selectChar('Gojo', this)">
                <div style="font-size: 40px;">♾️</div>
                <span>Gojo</span>
            </div>
            <div class="card" onclick="selectChar('Sukuna', this)">
                <div style="font-size: 40px;">🔪</div>
                <span>Sukuna</span>
            </div>
        </div>
        <button id="start-btn" class="hidden" onclick="initGame()">DÖVÜŞÜ BAŞLAT</button>
    </div>

    <canvas id="game-canvas" width="800" height="400"></canvas>

    <script>
        let selectedCharacter = "";

        // Ekran Değiştirme
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // Karakter Seçimi
        function selectChar(name, element) {
            selectedCharacter = name;
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            element.classList.add('selected');
            document.getElementById('start-btn').classList.remove('hidden');
        }

        // OYUN MOTORU (CANVAS)
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');

        function initGame() {
            showScreen('none'); // Tüm ekranları gizle
            canvas.style.display = 'block';
            gameLoop();
        }

        // Basit Oyuncu Objeleri
        const player = { x: 100, y: 300, width: 50, height: 80, color: 'cyan', health: 100 };
        const enemy = { x: 650, y: 300, width: 50, height: 80, color: 'red', health: 100 };

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Ekranı temizle

            // Yer Çizgisi
            ctx.strokeStyle = "white";
            ctx.beginPath(); ctx.moveTo(0, 380); ctx.lineTo(800, 380); ctx.stroke();

            // Oyuncuları Çiz (Şimdilik kutu olarak)
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            
            ctx.fillStyle = enemy.color;
            ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);

            // Can Barları
            ctx.fillStyle = "red";
            ctx.fillRect(20, 20, 200, 20); // Arka plan
            ctx.fillStyle = "lime";
            ctx.fillRect(20, 20, player.health * 2, 20); // Oyuncu canı

            ctx.fillStyle = "white";
            ctx.fillText(selectedCharacter + " (Sen)", 20, 15);
            ctx.fillText("Rakip (CPU)", 650, 15);
        }

        function gameLoop() {
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
