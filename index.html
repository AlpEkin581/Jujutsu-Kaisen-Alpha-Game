<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ALP TECH - JJK Cursed Clash</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: white; text-align: center; margin: 0; overflow: hidden; }
        .screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; position: absolute; width: 100%; top: 0; left: 0; background: #0a0a0a; z-index: 10; }
        .hidden { display: none !important; }
        
        button { background: #5d00ff; border: none; color: white; padding: 15px 40px; font-size: 18px; cursor: pointer; border-radius: 50px; margin: 10px; box-shadow: 0 4px 15px rgba(93, 0, 255, 0.4); }
        
        .char-container { display: flex; gap: 20px; }
        .card { width: 120px; height: 160px; border: 2px solid #333; border-radius: 15px; cursor: pointer; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; }
        .card.selected { border-color: #00ffcc; transform: translateY(-10px); }

        /* Oyun Arenası */
        #game-container { display: none; width: 100vw; height: 100vh; background: #111; position: relative; }
        canvas { background: #222; border: 2px solid #444; margin-top: 50px; }
    </style>
</head>
<body>

    <div id="menu-screen" class="screen">
        <h1>JUJUTSU KAISEN</h1>
        <button onclick="showScreen('char-screen')">OYUNA BAŞLA</button>
    </div>

    <div id="char-screen" class="screen hidden">
        <h2>KARAKTERİNİ SEÇ</h2>
        <div class="char-container">
            <div class="card" onclick="selectChar('Yuji', this)"> 👊<br>Yuji </div>
            <div class="card" onclick="selectChar('Gojo', this)"> ♾️<br>Gojo </div>
            <div class="card" onclick="selectChar('Sukuna', this)"> 🔪<br>Sukuna </div>
        </div>
        <button id="start-btn" class="hidden" onclick="initGame()">DÖVÜŞÜ BAŞLAT</button>
    </div>

    <div id="game-container">
        <canvas id="game-canvas" width="800" height="400"></canvas>
        <p>Hareket: Ok Tuşları | Zıplama: Yukarı Ok</p>
    </div>

    <script>
        let selectedCharacter = "";
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const keys = {};

        // Ekran Yönetimi
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            if(id !== 'none') document.getElementById(id).classList.remove('hidden');
        }

        // Karakter Seçimi
        function selectChar(name, element) {
            selectedCharacter = name;
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            element.classList.add('selected');
            document.getElementById('start-btn').classList.remove('hidden');
        }

        // Oyuncu Bilgileri
        const player = { x: 50, y: 300, w: 50, h: 80, color: '#00ffcc', speed: 5, dy: 0, jumpPower: -15, grounded: false };

        function initGame() {
            showScreen('none'); // Menüleri kapat
            document.getElementById('game-container').style.display = 'block';
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            gameLoop();
        }

        function update() {
            // Sağ-Sol Hareket
            if (keys['ArrowRight']) player.x += player.speed;
            if (keys['ArrowLeft']) player.x -= player.speed;

            // Zıplama ve Yerçekimi
            if (keys['ArrowUp'] && player.grounded) {
                player.dy = player.jumpPower;
                player.grounded = false;
            }

            player.dy += 0.8; // Yerçekimi
            player.y += player.dy;

            // Yere çarpma kontrolü
            if (player.y + player.h > 380) {
                player.y = 380 - player.h;
                player.dy = 0;
                player.grounded = true;
            }
        }

        function draw() {
            ctx.fillStyle = "#222";
            ctx.fillRect(0, 0, canvas.width, canvas.height); // Arka planı temizle

            // Yer
            ctx.fillStyle = "#444";
            ctx.fillRect(0, 380, 800, 20);

            // Oyuncu
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.w, player.h);
            
            ctx.fillStyle = "white";
            ctx.fillText(selectedCharacter, player.x, player.y - 10);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
